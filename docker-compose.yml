services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5430:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d portfolio' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/portfolio?schema=public
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tcc.local}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-admin-password-12345}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://tcc.arthurlunkes.com.br,http://localhost:5173,http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '4000:4000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres_data:
