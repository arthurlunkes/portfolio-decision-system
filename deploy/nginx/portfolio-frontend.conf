# Nginx vhost for host machine (outside Docker)
# Replace "tcc.arthurlunkes.com.br" with your real domain.

upstream portfolio_frontend {
  server 127.0.0.1:8080;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name tcc.arthurlunkes.com.br;

  # Increase if you plan to upload larger payloads.
  client_max_body_size 20m;

  location / {
    proxy_pass http://portfolio_frontend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (safe even if not used).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

